name: Smoke Test
on:
  push:
    branches: [dev, beta, master]
    paths:
    - '.build/images/**'
    - '.github/scripts/**'
    - '.github/workflows/**'
    - '.update/**'
    - 'assets/calamares/**'
    - 'shaughvos/**'
    - 'rootfs/**'
    - 'shaughvos.txt'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  smoke:
    runs-on: ubuntu-24.04
    container:
      image: debian:bookworm-slim
    steps:
    - uses: actions/checkout@v6
    - name: Setup shaughvOS environment
      run: |
        apt-get update && apt-get install -y bash dash curl ca-certificates python3 shellcheck systemd
        mkdir -p /boot/shaughvos/func
        cp shaughvos/func/shaughvos-globals /boot/shaughvos/func/
        cp shaughvos/func/shaughvos-obtain_hw_model /boot/shaughvos/func/
        chmod +x /boot/shaughvos/func/*
        # Create minimal hw_model for testing
        mkdir -p /boot/shaughvos
        echo -e '0\n20\nx86_64\n10' > /boot/shaughvos/.hw_model
        echo -e 'G_HW_MEMORY_SIZE=2048\nG_HW_ONBOARD_WIFI=0' >> /boot/shaughvos/.hw_model
        # Create version file
        cp .update/version /boot/shaughvos/.version
        # Create config
        cp shaughvos.txt /boot/shaughvos.txt

    - name: Verify all scripts parse
      run: |
        echo '--- Checking bash syntax for all shell scripts ---'
        errors=0
        while IFS= read -r f; do
          shebang=$(head -1 "$f")
          case "$shebang" in
            *'/bin/bash'*|*'/usr/bin/env bash'*) shell=bash ;;
            *'/bin/dash'*|*'/usr/bin/env dash'*) shell=dash ;;
            *) continue ;;
          esac
          if ! "$shell" -n "$f" 2>/dev/null; then
            echo "FAIL: $f"
            errors=$((errors + 1))
          else
            echo "OK: $f"
          fi
        done < <(find .build/images shaughvos rootfs/usr/local/bin rootfs/etc/bashrc.d -type f)
        echo "--- $errors errors found ---"
        [ "$errors" -eq 0 ]

    - name: Run focused ShellCheck
      run: |
        mapfile -t files < <(
          find .build/images shaughvos rootfs/usr/local/bin rootfs/etc/bashrc.d -type f \
            -exec awk 'NR == 1 && /^#!.*(ba|da)?sh([[:blank:]]|$)/ {print FILENAME}' {} \;
        )
        shellcheck -C -xo all "${files[@]}"

    - name: Validate install/startup invariants
      run: python3 .github/scripts/validate-install-startup.py

    - name: Verify shaughvos-globals sources
      run: |
        export G_PROGRAM_NAME='smoke-test'
        # Source globals in a subshell to test it loads
        bash -c '. /boot/shaughvos/func/shaughvos-globals && echo "G_SHAUGHVOS-NOTIFY function: $(type -t G_SHAUGHVOS-NOTIFY)"'

    - name: Verify no dietpi branding in scripts
      run: |
        # Check for dietpi branding — exclude legitimate upstream infrastructure:
        # - dietpi.com URLs (real server for packages, docs, forums, APIs)
        # - Author attribution lines (daniel.knight@dietpi.com, micha@dietpi.com)
        # - Man page DietPi attribution
        pattern='diet''pi'
        count=$(grep -ri "$pattern" shaughvos/ rootfs/ shaughvos.txt 2>/dev/null \
          | grep -v '\.update/patches' \
          | grep -v 'dietpi\.com' \
          | grep -v '@dietpi\.com' \
          | grep -v 'foundation by Daniel Knight' \
          | grep -vc '^$' || true)
        echo "DietPi branding references found (excluding .com URLs and attribution): $count"
        [ "$count" -eq 0 ]

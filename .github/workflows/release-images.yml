name: Release Images
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      targets:
        description: 'Build targets'
        type: choice
        options: [all, rpi4, rpi5, x86-pc, x86-vm]
        default: all
        required: true
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  prep:
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      version: ${{ steps.version.outputs.version }}
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
        else
          echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
        fi
    - id: targets
      run: |
        input='${{ github.event.inputs.targets }}'
        if [ -z "$input" ] || [ "$input" = 'all' ]; then
          echo 'targets=["rpi4", "rpi5", "x86-pc", "x86-vm"]' >> "$GITHUB_OUTPUT"
        else
          echo "targets=[\"$input\"]" >> "$GITHUB_OUTPUT"
        fi

  build:
    needs: prep
    strategy:
      matrix:
        target: ${{ fromJson(needs.prep.outputs.targets) }}
      fail-fast: false
    name: "Build: ${{ matrix.target }}"
    runs-on: ${{ (matrix.target == 'rpi4' || matrix.target == 'rpi5') && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
    - name: Build image
      run: |
        # Map target to shaughvos-build arguments
        variant=''
        case '${{ matrix.target }}' in
          rpi4)   model=4;  desc='RPi234-aarch64';;
          rpi5)   model=5;  desc='RPi5-aarch64';;
          x86-pc) model=21; desc='NativePC-x86_64'; variant='-v all';;
          x86-vm) model=20; desc='VM-x86_64'; variant='-v all';;
        esac

        sudo systemctl --now mask ssh ssh.socket systemd-resolved azure-proxy-agent 2>/dev/null || true
        echo 'nameserver 1.1.1.1' | sudo tee /etc/resolv.conf > /dev/null

        # Resolve branch: tags point to master, otherwise use the ref directly
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          branch='master'
        else
          branch="$GITHUB_REF_NAME"
        fi

        # Run build from a clean directory (not the repo checkout — shaughvos-build creates its own rootfs/)
        mkdir -p /tmp/shaughvos-build && cd /tmp/shaughvos-build
        sudo bash -c "G_GITOWNER=$GITHUB_REPOSITORY_OWNER G_GITBRANCH=$branch; \
          $(curl -sSf "https://raw.githubusercontent.com/$GITHUB_REPOSITORY_OWNER/shaughvOS/$branch/.build/images/shaughvos-build" || echo false)" \
          -- -m "$model" -o "$GITHUB_REPOSITORY_OWNER" -b "$branch" $variant

        # Find and rename output images
        version='${{ needs.prep.outputs.version }}'
        found=0

        # Move .img.xz files
        for img in /tmp/shaughvos-build/*.img.xz; do
          [ -f "$img" ] || continue
          mv "$img" "$GITHUB_WORKSPACE/shaughvOS_${desc}.img.xz"
          found=1
        done

        # Move .iso files (produced by -v all for x86 targets)
        for iso in /tmp/shaughvos-build/*.iso; do
          [ -f "$iso" ] || continue
          mv "$iso" "$GITHUB_WORKSPACE/shaughvOS_${desc}_Installer.iso"
          found=1
        done

        if [ "$found" -eq 0 ]; then
          echo "::error::No image file produced"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: shaughvOS-${{ matrix.target }}
        path: shaughvOS_*
        retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prep, build]
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Generate checksums
      run: |
        cd artifacts
        find . -type f \( -name '*.img.xz' -o -name '*.7z' -o -name '*.iso' \) -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > SHA256SUMS.txt
        cat SHA256SUMS.txt

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        version='${{ needs.prep.outputs.version }}'
        gh release create "$version" \
          --title "shaughvOS $version" \
          --generate-notes \
          artifacts/*/* \
          artifacts/SHA256SUMS.txt

---
# Post-install cleanup: remove live-session artifacts and prepare the installed system
dontChroot: false
script:
  # --- Phase 1: Remove live-session-only files ---
  - command: "rm -f /etc/sudoers.d/live-admin"
    timeout: 10
  - command: "rm -f /etc/lightdm/lightdm.conf.d/live-autologin.conf"
    timeout: 10
  - command: "rm -f /etc/polkit-1/rules.d/49-shaughvos-live.rules"
    timeout: 10
  - command: "rm -f /usr/local/bin/launch-calamares"
    timeout: 10
  - command: "rm -f /etc/xdg/autostart/calamares-installer.desktop /usr/share/applications/calamares-installer.desktop"
    timeout: 10
  - command: "rm -rf /etc/calamares"
    timeout: 10
  - command: "rm -f /etc/systemd/system/shaughvos-live-check.service /etc/systemd/system/graphical.target.wants/shaughvos-live-check.service /usr/local/bin/shaughvos-live-check"
    timeout: 10
  # --- Phase 1b: Protect critical desktop/session packages from autoremove ---
  # With APT::Install-Recommends "false", some packages are only installed because
  # the base image explicitly requested them, not as hard deps of the desktop meta-package.
  # Mark them manual so autoremove never touches them.
  - command: "apt-mark manual xfce4 xfce4-session xfwm4 xfdesktop4 xfce4-panel thunar xfce4-terminal lightdm lightdm-gtk-greeter dbus dbus-user-session dbus-x11 x11-common xserver-xorg-core xinit x11-xserver-utils polkitd libpam-systemd plymouth plymouth-themes papirus-icon-theme nodejs npm firefox-esr torbrowser-launcher librsvg2-common rustc cargo nmap wireshark wireshark-common tshark tcpdump nano less tree bat ncdu btop fzf vim wget git network-manager network-manager-gnome xfce4-power-manager xfce4-pulseaudio-plugin pulseaudio pavucontrol tailscale 2>/dev/null || true"
    timeout: 30
  # --- Phase 1c: Ensure D-Bus session bus fallback for Xfce ---
  # dbus-x11 provides /etc/X11/Xsession.d/75dbus_dbus-launch which starts a D-Bus
  # session bus if systemd --user doesn't provide one. Belt and suspenders.
  - command: "apt-get install -y --no-install-recommends dbus-x11 2>/dev/null || true"
    timeout: 60
  # --- Phase 2: Remove live-only packages (live-boot hooks confuse installed system's initramfs) ---
  - command: "apt-get purge -y live-boot live-boot-initramfs-tools calamares calamares-settings-debian 2>/dev/null || true"
    timeout: 120
  - command: "apt-get autoremove -y 2>/dev/null || true"
    timeout: 60
  # --- Phase 3: Security + first-boot prep ---
  - command: "rm -f /etc/ssh/ssh_host_*"
    timeout: 10
  - command: "ssh-keygen -A"
    timeout: 30
  - command: "rm -f /var/lib/shaughvos/.check_user_passwords"
    timeout: 10
  # --- Phase 4a: Flip installed system to CLI-first (multi-user.target) ---
  # The squashfs inherited graphical.target from the imager (the live ISO needs
  # it for Calamares autostart). Installed systems default to console login.
  # Users run `desktop on` to switch to Xfce (persistent via systemctl set-default).
  - command: "systemctl set-default multi-user.target"
    timeout: 10
  - command: "mkdir -p /boot/shaughvos && echo 7 > /boot/shaughvos/.shaughvos-autostart_index"
    timeout: 10
  # Write getty autologin drop-in for the Calamares-created user so TTY login
  # is frictionless out of the box. Users run `sudo autologin off` to opt out.
  # Target-user detection: scan /etc/passwd for the first non-system UID >= 1000 (Calamares's newly-created user).
  - command: |
      target=$(awk -F: '$3 >= 1000 && $3 < 65534 && $1 != "nobody" {print $1; exit}' /etc/passwd)
      [ -z "$target" ] && target=admin
      mkdir -p /etc/systemd/system/getty@tty1.service.d
      printf '[Service]\nExecStart=\nExecStart=-/sbin/agetty -a %s -J %%I $TERM\n' "$target" \
        > /etc/systemd/system/getty@tty1.service.d/shaughvos-autologin.conf
      mkdir -p /etc/lightdm/lightdm.conf.d
      printf '[Seat:*]\nautologin-user=%s\nautologin-session=xfce\nautologin-user-timeout=0\n' "$target" \
        > /etc/lightdm/lightdm.conf.d/90-shaughvos-autologin.conf
      getent group wireshark > /dev/null && usermod -aG wireshark "$target" 2>/dev/null || true
    timeout: 30
  # --- Phase 4: Rebuild initramfs (without live-boot hooks) ---
  - command: "update-initramfs -u"
    timeout: 120
  # Note: update-grub is NOT needed here — the Calamares bootloader module
  # runs AFTER shellprocess and handles grub-install + update-grub itself.

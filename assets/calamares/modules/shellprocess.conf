---
# Post-install cleanup: remove live-session artifacts and prepare the installed system
dontChroot: false
script:
  # --- Phase 1: Remove live-session-only files ---
  - command: "rm -f /etc/sudoers.d/live-admin"
    timeout: 10
  - command: "rm -f /etc/lightdm/lightdm.conf.d/live-autologin.conf"
    timeout: 10
  - command: "rm -f /etc/polkit-1/rules.d/49-shaughvos-live.rules"
    timeout: 10
  - command: "rm -f /usr/local/bin/launch-calamares"
    timeout: 10
  - command: "rm -f /etc/xdg/autostart/calamares-installer.desktop /usr/share/applications/calamares-installer.desktop"
    timeout: 10
  - command: "rm -rf /etc/calamares"
    timeout: 10
  # --- Phase 2: Remove live-only packages (live-boot hooks confuse installed system's initramfs) ---
  - command: "apt-get purge -y live-boot live-boot-initramfs-tools calamares calamares-settings-debian 2>/dev/null || true"
    timeout: 120
  - command: "apt-get autoremove -y 2>/dev/null || true"
    timeout: 60
  # --- Phase 3: Security + first-boot prep ---
  - command: "rm -f /etc/ssh/ssh_host_*"
    timeout: 10
  - command: "ssh-keygen -A"
    timeout: 30
  - command: "rm -f /var/lib/shaughvos/.check_user_passwords"
    timeout: 10
  # --- Phase 4: Rebuild initramfs (without live-boot hooks) ---
  - command: "update-initramfs -u"
    timeout: 120
  # Note: update-grub is NOT needed here — the Calamares bootloader module
  # runs AFTER shellprocess and handles grub-install + update-grub itself.

---
# Post-install cleanup: remove live-session-only artifacts from the installed system
dontChroot: false
script:
  - command: "rm -f /etc/sudoers.d/live-admin"
    timeout: 10
  - command: "rm -f /etc/lightdm/lightdm.conf.d/shaughvos-autologin.conf"
    timeout: 10
  - command: "rm -f /etc/systemd/system/getty@tty1.service.d/shaughvos-autologin.conf /etc/systemd/system/console-getty.service.d/shaughvos-autologin.conf"
    timeout: 10
  - command: "rm -f /etc/polkit-1/rules.d/49-shaughvos-live.rules"
    timeout: 10
  - command: "rm -f /usr/local/bin/launch-calamares"
    timeout: 10

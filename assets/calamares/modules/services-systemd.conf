---
# Re-enable shaughvOS services on the installed system
# These are disabled in the live-boot squashfs to prevent conflicts,
# but the installed system needs them for normal operation.
services:
  - name: shaughvos-preboot
    action: enable
  - name: shaughvos-postboot
    action: enable
  - name: shaughvos-ramlog
    action: enable

---
# User account configuration
# shaughvOS creates 'admin' user with sudo access and desktop autologin
defaultGroups:
  - name: users
    must_exist: false
  - name: sudo
    must_exist: false
  - name: adm
    must_exist: false
  - name: audio
    must_exist: false
  - name: video
    must_exist: false
  - name: plugdev
    must_exist: false
  - name: netdev
    must_exist: false
  - name: cdrom
    must_exist: false

doAutologin: true
setRootPassword: true
doReusePassword: true

---
# shaughvOS Calamares Installer Configuration
# https://github.com/calamares/calamares/wiki/Deploy-Guide

modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - services-systemd
    - shellprocess
    - bootloader
    - umount
  - show:
    - finished

branding: shaughvos
prompt-install: true
dont-chroot: false
